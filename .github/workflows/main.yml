name: Build Soul Blade Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Java 21 installieren
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle Wrapper installieren
        run: |
          wget https://services.gradle.org/distributions/gradle-8.8-bin.zip -O gradle.zip
          unzip gradle.zip
          export PATH=$PWD/gradle-8.8/bin:$PATH
          gradle wrapper
          chmod +x gradlew

      - name: Mod bauen
        run: |
          export PATH=$PWD/gradle-8.8/bin:$PATH
          ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -Xms1g"

      - name: JAR hochladen
        uses: actions/upload-artifact@v4
        with:
          name: soulblade-mod-jar
          path: build/libs/soulblade-*.jar
          if-no-files-found: error
